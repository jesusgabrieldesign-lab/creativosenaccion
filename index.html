<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesús Gabriel Ramírez | Portafolio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        /* ADN VISUAL - GLOBAL STYLES */
        :root {
            --primary: #000000;
            --secondary: #FFFFFF;
            --accent: #E89F22;
            --bg-soft: #F4F4F4;
            --border: 2px solid #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--secondary);
            color: var(--primary);
            line-height: 1.4;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }

        /* HEADER */
        header {
            border-bottom: var(--border);
            padding: 20px 0;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* TEXTO VERTICAL (SIDEBARS) */
        .vertical-text {
            display: none;
            position: fixed;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            z-index: 10;
        }
        @media (min-width: 1024px) {
            .vertical-text { display: block; }
            .left-sidebar { left: 20px; top: 50%; transform: rotate(-180deg); writing-mode: vertical-rl; }
            .right-sidebar { right: 20px; top: 50%; transform: translateY(-50%); writing-mode: vertical-rl; font-size: 3rem; color: var(--accent); opacity: 0.2; }
        }

        /* TITULOS */
        h1 { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; text-transform: uppercase; line-height: 0.8; margin: 40px 0; letter-spacing: -3px; }
        h2 { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .serif { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); text-transform: none; letter-spacing: 0; }

        /* GRID PORTADA */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 80px;
        }
        .hero-grid img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: var(--border); }

        /* SECCIONES EDITORIALES */
        .section-editorial {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
            margin-bottom: 100px;
            padding-top: 40px;
            border-top: 1px solid #eee;
        }
        .section-editorial img { width: 100%; border: var(--border); }
        .editorial-content { border-left: var(--border); padding-left: 30px; }

        /* BLOQUE DE BIENESTAR / SKILLS */
        .skills-container {
            background-color: var(--bg-soft);
            border: var(--border);
            padding: 40px;
            margin-bottom: 100px;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .skill-card {
            background: #fff;
            padding: 20px;
            border: 1px solid #000;
        }
        .skill-card b { display: block; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
