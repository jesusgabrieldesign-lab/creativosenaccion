<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Leon | Expresión Visual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --accent: #E89F22; --leon-green: #2ecc71; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f4f4f4; color: #000; text-align: center; }
        
        /* Cabecera Estilo Pro */
        .header-leon { background: var(--primary); color: white; padding: 40px 20px; border-bottom: 6px solid var(--leon-green); }
        .serif { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); text-transform: uppercase; margin: 0; line-height: 0.8; letter-spacing: -3px; }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* Pasos Visuales */
        .steps-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 30px 0; }
        .step-card { background: white; border: 2px solid #000; padding: 15px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; box-shadow: 5px 5px 0px #000; }
        
        /* Caja del Formulario */
        .form-wrapper { 
            background: white; 
            border: 3px solid #000; 
            box-shadow: 15px 15px 0px var(--leon-green); 
            margin-top: 20px; 
            overflow: hidden;
            position: relative;
        }
        
        /* Ajuste para que el iframe sea responsivo */
        .form-wrapper iframe { 
            width: 100%; 
            height: 900px; /* Ajustado para que quepa el formulario completo */
            border: none; 
        }

        .footer-nav { margin-top: 50px; padding-bottom: 40px; }
        .btn-back { color: #000; text-decoration: none; font-weight: 900; border-bottom: 3px solid var(--accent); text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-leon">
        <h1>DESAFÍO <br><span class="serif">Leon Pro</span></h1>
        <p style="letter-spacing: 3px; font-size: 0.7rem; margin-top: 15px; font-weight: 400;">TALLER DE EXPRESIÓN VISUAL — MODO COMPETENCIA</p>
    </div>

    <div class="container">
        <div class="steps-container">
            <div class="step-card">1. Regístrate 📝</div>
            <div class="step-card">2. Baja la Guía 📥</div>
            <div class="step-card">3. Envía el dibujo 📱</div>
        </div>

        <p style="font-weight: 400; color: #555; margin-bottom: 25px;">Completa los datos para desbloquear el acceso al PDF secreto.</p>

        <div class="form-wrapper">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdQlAPKDH8DeLHgZ148qrRF7wJuIjCvzBGolqFkqCmmDbjHOA/viewform?embedded=true">Cargando…</iframe>
        </div>

        <div class="footer-nav">
            <a href="index.html" class="btn-back">← Volver a la página principal</a>
        </div>
    </div>

</body>
</html>
