<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Leon | Expresión Visual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000000; --accent: #E89F22; --leon-green: #2ecc71; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f9f9f9; color: #000; text-align: center; }
        .header-leon { background: var(--primary); color: white; padding: 60px 20px; }
        .serif { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); }
        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        h1 { font-size: 3.5rem; text-transform: uppercase; margin: 0; line-height: 0.9; }
        .instructions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 40px 0; }
        .step { border: 2px solid #000; padding: 20px; background: white; font-weight: bold; }
        .form-box { background: white; border: 3px solid #000; padding: 10px; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 700px; border: none; }
    </style>
</head>
<body>
    <div class="header-leon">
        <h1>DESAFÍO <br><span class="serif">Leon Pro</span></h1>
        <p>DIBUJA AL BRAWLER MÁS POPULAR Y GANA UNA CLASE PERSONALIZADA</p>
    </div>
    <div class="container">
        <div class="instructions">
            <div class="step">1. REGÍSTRATE</div>
            <div class="step">2. DESCARGA</div>
            <div class="step">3. ¡DIBUJA!</div>
        </div>
        <p>Una vez que te registres, obtendrás el link de descarga de la guía paso a paso.</p>
        <div class="form-box">
            <iframe src="TU_LINK_DE_GOOGLE_FORM_AQUI?embedded=true">Cargando…</iframe>
        </div>
    </div>
</body>
</html>
